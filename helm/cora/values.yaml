dockerRepository:
  url: docker.epc.ub.uu.se/
  useImagePullSecrets: false
  imagePullSecrets: someImagePullSecret
initContainer:
  waitForDb:
    - name: init-wait-for-db-and-updatedb
      image: postgres:18-alpine
      env:
        - name: PGHOST
          value: postgresql
        - name: PGPORT
          value: "5432"
        - name: PGDATABASE
          valueFrom: ... # same as app uses
        - name: PGUSER
          valueFrom: ...
        - name: PGPASSWORD
          valueFrom: ...
        - name: UPDATEDB_VERSION
          value: "{{ .Chart.Version }}" # if you template values, otherwise set via values
      command:
        - sh
        - -c
        - |
          set -e
          until pg_isready; do echo waiting for database; sleep 2; done
          until psql -tAc "select value from cora_meta where key='updatedb_version'" | grep -qx "$UPDATEDB_VERSION"; do
            echo "waiting for updatedb job to set version $UPDATEDB_VERSION"
            sleep 2
          done
  waitForMq:
    - name: init-wait-for-mq
      image: alpine
      command:
        - sh
        - -c
        - until nc -z -v -w1 rabbitmq 5672; do echo "Waiting for RabbitMQ..";
          sleep 5; done
  waitForSolr:
    - name: init-wait-for-solr
      image: curlimages/curl:8.2.1
      command:
        - sh
        - -c
        - |
          until curl -s http://solr:8983/solr/admin/info/system | grep -q '"mode"'; do
            echo "Waiting for Solr HTTP endpoint.."
            sleep 5
          done
  waitForBinarySecret:
    - name: init-wait-for-binary-secret
      image: bitnami/kubectl:latest
      command:
        - sh
        - -c
        - |
          NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
          until kubectl -n "$NS" get secret binaryconverter-secret >/dev/null 2>&1; do
            echo "Waiting for binaryconverter-secret in namespace $NS...";
            sleep 5; done
  waitFor131313Secret:
    - name: init-wait-for-131313-secret
      image: bitnami/kubectl:latest
      command:
        - sh
        - -c
        - |
          NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
          until kubectl -n "$NS" get secret 131313-secret >/dev/null 2>&1; do
            echo "Waiting for 131313-secret in namespace $NS...";
            sleep 5; done
  waitFor121212Secret:
    - name: init-wait-for-121212-secret
      image: bitnami/kubectl:latest
      command:
        - sh
        - -c
        - |
          NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
          until kubectl -n "$NS" get secret 121212-secret >/dev/null 2>&1; do
            echo "Waiting for 121212-secret in namespace $NS...";
            sleep 5; done
