---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: systemone-postgres-volume-claim
  labels:
    app: systemone-postgres
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi

---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: systemone-archive-read-only-volume-claim
  labels:
    app: systemone-archive
spec:
  storageClassName: manual
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      storage: 20Gi
  volumeMode: Filesystem
  volumeName: systemone-archive-ro-volume
      
---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: systemone-archive-read-write-volume-claim
  labels:
    app: systemone-archive
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi

---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: systemone-converted-files-read-write-volume-claim
  labels:
    app: systemone-converted-files
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi

---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: systemone-index-read-write-volume-claim
  labels:
    app: systemone-index
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi

---

apiVersion: v1
kind: PersistentVolume
metadata:
  name: systemone-postgres-volume
  labels:
    type: local
    app: systemone-postgres
spec:
  storageClassName: manual
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /mnt/minikube/systemone/postgresql
  claimRef:
    namespace: systemone
    name: systemone-postgres-volume-claim

---

apiVersion: v1
kind: PersistentVolume
metadata:
  name: systemone-archive-ro-volume
  labels:
    target: systemone
spec:
#Behöver vi ange capacity?
  capacity:
    storage: 20Gi
  accessModes: ["ReadOnlyMany"]
  persistentVolumeReclaimPolicy: Retain
  volumeMode: Filesystem
  csi:
    driver: nfs.csi.k8s.io
    volumeHandle: systemone-archive-ro-volume
    volumeAttributes:
      server: systemone-nfs.systemone.svc.cluster.local
      share: /archive-read-only
      mountOptions: "nolock,vers=4,actimeo=60,lookupcache=positive,nocto,noatime,nodiratime"
  claimRef:
    namespace: systemone
    name: systemone-archive-read-only-volume-claim
  storageClassName: manual
  
---

apiVersion: v1
kind: PersistentVolume
metadata:
  name: systemone-archive-rw-volume
  labels:
    type: local
    app: systemone-archive
spec:
  storageClassName: manual
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /mnt/minikube/systemone/archive
  claimRef:
    namespace: systemone
    name: systemone-archive-read-write-volume-claim

---

apiVersion: v1
kind: PersistentVolume
metadata:
  name: systemone-converted-files-volume
  labels:
    type: local
    app: systemone-converted-files
spec:
  storageClassName: manual
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteMany
  hostPath:
    path: /mnt/minikube/systemone/convertedFiles
  claimRef:
    namespace: systemone
    name: systemone-converted-files-read-write-volume-claim

